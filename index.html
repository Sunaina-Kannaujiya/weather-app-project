<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.CSS">
</head>
<body>
    
    <div class="container">
        <div class="header">
            <div class="search-box">
                <input type="text" placeholder="enter city name" class="input-box">
                <button class="assests/icons8-search-25.png" id="searchBtn"></button>
            </div>
        </div>
        <div class="location-not-found">
            <h1>Sorry, Location not found!!!</h1>
            <img src="assests/404.png " alt="404 Error">
        </div>
        <div class="weather-body">
            <img src="assests/weather image.png" class="weather-img">
            
            <div class="weather-box">
                <p class="temperature">22<sup> °c</sup></p>
                <p class="description">Light Rain</p>

            </div>
           
          
            <div class="weather-details">
                <div class="humidity">
                    <img src="assests/icons8-humidity-80.png">
                        <div class="text">
                            <span id="humidity">45%</span>
                            <p>humidity</p>
                        </div>
                
                </div>
                    <div class="wind">
                        <img src="assests/icons8-wind-100.png">
                   
                        <div class="text">
                            <span id="wind-speed">12Km/H</span>
                            <p>wind speed</p>
                        </div>
                    </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
    <script src ="https://kit.fontawesome.com/595a890311.js"crossorigin="anonymous"></script>
</body>
</html>
